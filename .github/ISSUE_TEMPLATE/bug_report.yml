name: Bug Report
description: Report a defect in RepoGraph Intelligence
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below so we can reproduce and triage quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: When I run `repograph build`, the graph is missing edges for dynamic imports.
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command you ran.
      placeholder: npm run repograph -- build .
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error output if any.
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: Repository Language / Framework
      description: The primary language of the repository being analyzed.
      options:
        - JavaScript
        - TypeScript
        - Python
        - Rust
        - Mixed / Polyglot
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - OS and version
        - Node.js version (`node --version`)
        - RepoGraph version or commit SHA
        - Rust toolchain version (if relevant)
      render: markdown
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: A small fixture, public repo URL, or minimal steps that reproduce the issue.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs, screenshots, or anything else that helps.
    validations:
      required: false
